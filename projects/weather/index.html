<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GALACTIC WEATHER</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="icon" type="image/x-icon" href="../assets/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
   
    <div class="container">
        <img src="./assets/weatherapplogo.png" alt="Logo" class="logo">
        <div class="searchbox">
            <div id="search">
                <input id="search-input" type="text" placeholder="Enter your location"/>
                <button id="search-button">Go!</button>
            </div>
            <button id="locate-button" type="button">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="12" cy="10" r="3"/>
                    <path d="M12 2a8 8 0 0 0-8 8c0 5.4 8 12 8 12s8-6.6 8-12a8 8 0 0 0-8-8z"/>
                </svg>
                Use my location
            </button>
            <div id="output">Enter your location to find out which planet you're on based on the weather in your area!</div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <p>Built by <a href="https://www.danielhartgrove.xyz">Daniel Hartgrove</a></p>
    </footer>

    <script src="./script.js"></script>
</body>
</html>
